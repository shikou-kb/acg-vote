<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 投票结果 - ACG角色人气投票</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">🌟 四川大学萌战</div>
        <div class="nav-links">
            <a href="about.html">📜 赛制</a>
            <a href="index.html">🗳️ 投票</a>
            <a href="results.html" class="active">📊 实时</a>
            <a href="final.html">🏆 结果</a>
        </div>
    </nav>
    <!-- 顶部 -->
    <header class="results-hero">
        <h1>📊 实时投票结果</h1>
        <p>数据来自浏览器本地记录 · 每次刷新自动更新</p>
    </header>

    <!-- 图表区域 -->
    <section class="charts-wrapper">
        <div class="chart-box">
            <h2>🏆 人气排行 TOP 10</h2>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>📊 各分组票数占比</h2>
            <canvas id="pieChart"></canvas>
        </div>
    </section>

    <!-- 完整排名表格 -->
    <section class="ranking-wrapper">
        <h2>📋 完整排名表</h2>
        <div style="overflow-x:auto;">
            <table class="rank-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>角色</th>
                        <th>作品</th>
                        <th>分组</th>
                        <th>票数</th>
                        <th style="min-width:120px;">占比</th>
                    </tr>
                </thead>
                <tbody id="rank-tbody">
                    <!-- 由 results.js 自动生成 -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <p>🌟 四川大学萌战 · 由四川大学萌战委员会主办</p>
        <p>所有角色及相关图像版权归原作者/版权方所有 · 仅供校园文化交流</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="db.js"></script>
    <script src="results.js"></script>
</body>
</html>
